[project]
state = "NC"
synthetic_data = false

[snapshots]
store_dir = "data/snapshots"
source_name = "manual-reviewed-export"

[access]
primary_threshold_miles = 30
report_thresholds_miles = [30, 45, 60]
travel_time_threshold_minutes = 45
report_thresholds_minutes = [30, 45, 60]

[routing]
review_max_distance_miles = 150
route_statuses = ["routed", "unreachable", "excluded"]
approved_review_statuses = ["reviewed", "verified", "approved"]

[adapters.census]
year = 2024
api_key_env = "CENSUS_API_KEY"

[geocoding]
provider = "census"
benchmark = "Public_AR_Current"
cache_path = "data/cache/geocoding/census.json"

[reports]
output_dir = "outputs/analysis"
include_html = true

[sensitivity]
enabled = true
scenarios = [
  "baseline",
  "mean_access_heavy",
  "tail_access_heavy",
  "threshold_heavy",
  "vulnerability_heavy",
]
