name: self-hosted OSRM travel-time package

on:
  workflow_dispatch:
    inputs:
      osm_data_timestamp:
        description: OSM data timestamp printed on the Geofabrik North Carolina page.
        default: "2026-06-19T20:21:41Z"
        required: true
      osm_extract_url:
        description: Geofabrik OSM PBF extract URL.
        default: "https://download.geofabrik.de/north-america/us/north-carolina-latest.osm.pbf"
        required: true
      osrm_image:
        description: OSRM backend container image.
        default: "ghcr.io/project-osrm/osrm-backend:v6.0.0"
        required: true

permissions:
  contents: read

jobs:
  build-self-hosted-osrm-package:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Build OSRM graph and audited travel-time package
        env:
          OSM_DATA_TIMESTAMP: ${{ inputs.osm_data_timestamp }}
          OSM_EXTRACT_URL: ${{ inputs.osm_extract_url }}
          OSRM_IMAGE: ${{ inputs.osrm_image }}
        run: bash scripts/run_self_hosted_osrm_matrix.sh
      - name: Upload self-hosted OSRM package
        uses: actions/upload-artifact@v4
        with:
          name: self-hosted-osrm-travel-time-package
          path: |
            work/self-hosted-osrm/*.csv
            work/self-hosted-osrm/*.json
            work/self-hosted-osrm/analysis-tract-self-hosted-osrm/**
            !work/self-hosted-osrm/osrm/**
          if-no-files-found: error
