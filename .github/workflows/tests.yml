name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy src/radshock
      - run: pytest
      - run: python -m pip wheel . -w dist
      - run: radshock demo --output-dir outputs/demo-smoke
      - name: Streamlit smoke test
        run: |
          python - <<'PY'
          import subprocess
          import sys
          import time
          import urllib.request

          port = 8507
          process = subprocess.Popen(
              [
                  sys.executable,
                  "-m",
                  "streamlit",
                  "run",
                  "src/radshock/app.py",
                  "--server.headless=true",
                  f"--server.port={port}",
                  "--server.address=127.0.0.1",
                  "--browser.gatherUsageStats=false",
              ],
              stdout=subprocess.DEVNULL,
              stderr=subprocess.DEVNULL,
          )
          try:
              deadline = time.time() + 30
              while time.time() < deadline:
                  time.sleep(1)
                  try:
                      with urllib.request.urlopen(
                          f"http://127.0.0.1:{port}/_stcore/health", timeout=2
                      ) as response:
                          if response.status == 200:
                              break
                  except Exception:
                      if process.poll() is not None:
                          raise
              else:
                  raise SystemExit("Streamlit health check failed")
          finally:
              if process.poll() is None:
                  process.terminate()
                  process.wait(timeout=10)
          PY
