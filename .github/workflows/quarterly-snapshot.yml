name: quarterly MQSA source refresh

on:
  workflow_dispatch:
    inputs:
      state:
        description: Two-letter state filter for the MQSA review worklist.
        default: NC
        required: true
  schedule:
    - cron: "0 14 1 */3 *"

permissions:
  contents: read

jobs:
  prepare-mqsa-review-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Fetch FDA MQSA public source
        shell: bash
        run: |
          radshock fetch-fda-mqsa --output-dir work/source-refresh/raw --force
          archive_path="$(find work/source-refresh/raw/fda-mqsa-public -name public.zip -type f | sort | tail -n 1)"
          if [ -z "${archive_path}" ]; then
            echo "FDA MQSA archive was not created."
            exit 1
          fi
          run_date="$(basename "$(dirname "${archive_path}")")"
          echo "RUN_DATE=${run_date}" >> "${GITHUB_ENV}"
          echo "ARCHIVE_PATH=${archive_path}" >> "${GITHUB_ENV}"
      - name: Prepare MQSA review worklist
        shell: bash
        env:
          STATE_FILTER: ${{ inputs.state || 'NC' }}
        run: |
          state_upper="$(echo "${STATE_FILTER}" | tr '[:lower:]' '[:upper:]')"
          echo "STATE_FILTER=${state_upper}" >> "${GITHUB_ENV}"
          mkdir -p work/source-refresh/review
          radshock prepare-mqsa-review \
            "${ARCHIVE_PATH}" \
            --output-csv "work/source-refresh/review/fda_mqsa_${RUN_DATE}_${state_upper}_review.csv" \
            --state "${state_upper}" \
            --force
      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mqsa-review-artifacts
          path: |
            work/source-refresh/raw/fda-mqsa-public/*/public.zip.metadata.json
            work/source-refresh/review/*.csv
          if-no-files-found: error
